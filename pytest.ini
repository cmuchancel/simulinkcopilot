[pytest]
minversion = 8.0
addopts = -ra --strict-markers --strict-config
testpaths =
    backend/tests
    canonicalize/tests
    eqn2sim_gui/tests
    ir/tests
    latex_frontend/tests
    pipeline/tests
    simucompilebench/tests
    simulate/tests
    states/tests
    tests
    simulink
markers =
    matlab: requires a local MATLAB/Simulink engine
    slow: longer-running integration coverage
    property: property-based randomized tests
xfail_strict = true
